<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JsonPilot</title>
<link rel="icon" href="icon.png" type="image/png">
<link rel="shortcut icon" href="icon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
<style>
/* DEBUG: colored borders to identify each element */
html{background:#1e1e1e!important}
body{background:#111!important;color:#fff!important;margin:0!important;font-family:system-ui,sans-serif!important}
#app{display:flex!important;height:100vh!important;background:#1a1a1a!important;border:3px solid red!important}
#sidebar{width:260px!important;min-width:200px!important;background:#252526!important;border:3px solid #00ff00!important;display:flex!important;flex-direction:column!important;overflow:hidden!important}
#main-content{flex:1!important;display:flex!important;flex-direction:column!important;overflow:hidden!important;background:#1a1a1a!important;border:3px solid #0088ff!important}
#toolbar{padding:8px 16px!important;background:#2d2d2d!important;border:2px solid #ff8800!important;display:flex!important;align-items:center!important;gap:8px!important}
#editor-area{flex:1!important;overflow:auto!important;padding:16px!important;border:2px solid #ffff00!important}
#empty-state{color:#888!important;font-size:14px!important;text-align:center!important;margin-top:40px!important;border:1px solid #ff00ff!important;padding:10px!important}
#file-tree{flex:1!important;overflow-y:auto!important;padding:4px 0!important;border:1px solid cyan!important}
#path-bar{padding:8px!important;display:flex!important;gap:4px!important;border:1px solid orange!important}
#sidebar-header{padding:12px 16px!important;background:#2d2d2d!important;border:1px solid pink!important}
#sidebar-header h3{margin:0!important;font-size:14px!important;color:#d4d4d4!important}
#path-input{flex:1!important;background:#3c3c3c!important;border:1px solid #555!important;color:#d4d4d4!important;padding:4px 8px!important;border-radius:3px!important;font-size:12px!important}
#toolbar button{background:#3c3c3c!important;border:1px solid #555!important;color:#d4d4d4!important;padding:4px 12px!important;border-radius:3px!important;cursor:pointer!important;font-size:12px!important}
#toolbar button:disabled{opacity:0.4!important;cursor:default!important}
#file-path-display{color:#888!important;font-size:12px!important;flex:1!important}
.hidden{display:none!important}
.file-tree-item{padding:3px 12px!important;cursor:pointer!important;font-size:13px!important;color:#d4d4d4!important;white-space:nowrap!important;display:flex!important;align-items:center!important;gap:4px!important}
.file-tree-item:hover{background:#2a2d2e!important}
.file-tree-item .icon{font-size:12px!important;width:16px!important;text-align:center!important;flex-shrink:0!important}
.file-tree-item .label{overflow:hidden!important;text-overflow:ellipsis!important}
</style>
</head>
<body>
<div id="app">
    <div id="sidebar">
        <div id="sidebar-header">
            <h3>JSON Files</h3>
            <div id="sidebar-actions">
                <button id="btnTheme" title="Toggle theme">🌙</button>
                <button id="btnRefresh" title="Refresh file tree">↻</button>
            </div>
        </div>
        <div id="path-bar">
            <input type="text" id="path-input" placeholder="Data root path..." title="Root directory for JSON files">
            <button id="btnBrowseFolder" title="Browse for data folder">📂</button>
        </div>
        <div id="file-tree"></div>
    </div>
    <div id="main-content">
        <div id="toolbar">
            <span id="file-path-display"></span>
            <div id="toolbar-actions">
                <button id="btnSearch" title="Search (Ctrl+F)">Search</button>
                <button id="btnUndo" title="Undo (Ctrl+Z)">Undo</button>
                <button id="btnRedo" title="Redo (Ctrl+Y)">Redo</button>
                <button id="btnExpandAll">Expand All</button>
                <button id="btnCollapseAll">Collapse All</button>
                <button id="btnSave" disabled>Save</button>
                <button id="btnSaveAs" disabled>Save As</button>
            </div>
        </div>
        <div id="search-bar" class="search-bar hidden">
            <span class="search-label">Find:</span>
            <input type="text" id="search-input" placeholder="Search...">
            <span class="search-count" id="search-count"></span>
            <button id="search-prev" class="search-btn" title="Previous (Shift+Enter)">&#x25B2;</button>
            <button id="search-next" class="search-btn" title="Next (Enter)">&#x25BC;</button>
            <button id="btnSearchClear" class="search-btn" title="Clear (Backspace)">&#x2715;</button>
        </div>
        <div id="replace-bar" class="replace-bar hidden">
            <div class="replace-row">
                <span class="search-label">Find:</span>
                <input type="text" id="replace-find-input" placeholder="Search...">
                <span class="search-count" id="replace-count"></span>
            </div>
            <div class="replace-row">
                <span class="search-label">Replace:</span>
                <input type="text" id="replace-with-input" placeholder="Replace with..." disabled>
            </div>
            <div class="replace-row">
                <button id="btnReplaceConfirm" class="btn-ok" disabled>Replace All</button>
                <button id="btnReplaceCancel" class="btn-cancel">Cancel</button>
            </div>
        </div>
        <div id="editor-area">
            <div id="empty-state">Select a JSON file from the left panel</div>
            <div id="json-tree"></div>
            <div id="plain-text-view" class="hidden">
                <div id="plain-text-warning"></div>
                <textarea id="plain-text-content" spellcheck="false"></textarea>
            </div>
        </div>
    </div>
</div>

<div id="context-menu" class="context-menu hidden">
    <div class="menu-item" data-action="add-child">Add Child Item</div>
    <div class="menu-separator"></div>
    <div class="menu-item" data-action="copy-key">Copy Key</div>
    <div class="menu-item" data-action="copy-value">Copy Value</div>
    <div class="menu-separator"></div>
    <div class="menu-item" data-action="duplicate">Duplicate</div>
    <div class="menu-item" data-action="delete">Delete</div>
    <div class="menu-separator"></div>
    <div class="menu-item" data-action="replace-scope">Replace in Current Scope</div>
    <div class="menu-item" data-action="replace-global">Replace Globally</div>
</div>

<div id="filetree-menu" class="context-menu hidden">
    <div class="menu-item" data-action="ft-rename">Rename</div>
    <div class="menu-item" data-action="ft-copy">Copy</div>
    <div class="menu-item" data-action="ft-newfolder">New Folder</div>
    <div class="menu-item" data-action="ft-newfile">New JSON File</div>
    <div class="menu-separator"></div>
    <div class="menu-item" data-action="ft-delete">Delete</div>
</div>

<div id="filetree-empty-menu" class="context-menu hidden">
    <div class="menu-item" data-action="fe-newfolder">New Folder</div>
    <div class="menu-item" data-action="fe-newfile">New JSON File</div>
</div>

<div id="ft-rename-input" class="ft-inline-edit hidden">
    <input type="text" id="ft-rename-text">
</div>

<div id="confirm-dialog" class="dialog-overlay hidden">
    <div class="dialog-box">
        <div class="dialog-title">Confirm</div>
        <div class="dialog-message" id="confirm-message">Are you sure?</div>
        <div class="dialog-actions">
            <button id="confirm-cancel" class="btn-cancel">Cancel</button>
            <button id="confirm-ok" class="btn-ok">OK</button>
        </div>
    </div>
</div>

<div id="prompt-dialog" class="dialog-overlay hidden">
    <div class="dialog-box">
        <div class="dialog-title" id="prompt-title">Input</div>
        <div class="dialog-message">
            <input type="text" id="prompt-input" placeholder="">
        </div>
        <div class="dialog-actions">
            <button id="prompt-cancel" class="btn-cancel">Cancel</button>
            <button id="prompt-ok" class="btn-ok">OK</button>
        </div>
    </div>
</div>

<div id="save-as-dialog" class="dialog-overlay hidden">
    <div class="dialog-box">
        <div class="dialog-title">Save As</div>
        <div class="dialog-message">
            <label for="save-as-path">File path:</label>
            <div id="save-as-row">
                <input type="text" id="save-as-path" placeholder="filename.json">
                <button id="btnBrowse" class="btn-browse">Browse</button>
            </div>
        </div>
        <div class="dialog-actions">
            <button id="save-as-cancel" class="btn-cancel">Cancel</button>
            <button id="save-as-ok" class="btn-ok">Save</button>
        </div>
    </div>
</div>

<div id="add-dialog" class="dialog-overlay hidden">
    <div class="dialog-box">
        <div class="dialog-title">Add Child Item</div>
        <div class="dialog-message">
            <div id="add-key-group">
                <label for="add-key-input">Key:</label>
                <input type="text" id="add-key-input" placeholder="key name">
            </div>
            <label for="add-value-input">Value (JSON):</label>
            <textarea id="add-value-input" placeholder='Enter JSON value, e.g. "string", 42, true, null, {...}, [...]'></textarea>
            <div id="add-error" class="dialog-error hidden"></div>
        </div>
        <div class="dialog-actions">
            <button id="add-cancel" class="btn-cancel">Cancel</button>
            <button id="add-ok" class="btn-ok">Add</button>
        </div>
    </div>
</div>

<script src="webui.js"></script>
<script src="script.js"></script>
</body>
</html>
